<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="popupTitle"></title>
  <link rel="stylesheet" href="../css/popup.css" />
  <script type="module" src="../js/popup.js" defer></script>
</head>
<body>
  <header class="popup-header">
    <div class="title-wrapper">
      <h1 class="popup-title" data-i18n="popupTitle">Gestor de Descargas</h1>
    </div>
    <button id="openOptions" class="btn-options" data-i18n-title="openSettingsTooltip">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="gear-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </header>

  <section class="popup-section control-panel">
    <div class="setting-row">
      <label for="autoOrganizeToggle" data-i18n="autoOrganizeLabel"></label>
      <label class="toggle-switch">
        <input type="checkbox" id="autoOrganizeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="force-download-section">
      <div id="force-idle-view">
        <label for="forceFolderInput" class="force-label" data-i18n="forceDownloadLabel"></label>
        <div class="force-input-group">
          <div class="input-icon-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <input type="text" id="forceFolderInput" list="folder-suggestions" data-i18n-placeholder="forceDownloadPlaceholder">
          </div>
          <button id="forceNextDownloadBtn" class="btn-force">
            <svg class="btn-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="15" y2="15"></line><polyline points="12 12 15 15 12 18"></polyline></svg>
            <span data-i18n="activateButton"></span>
          </button>
        </div>
        <datalist id="folder-suggestions"></datalist>
      </div>
      <div id="force-active-view" style="display: none;">
        <div class="active-mode-card">
          <div class="active-icon-pulse">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--primary-color)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <p class="force-active-text"></p>
          <button id="cancelForceBtn" class="btn-cancel-force" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>
  </section>

  <section class="popup-section history-section">
    <details>
      <summary><span class="summary-text" data-i18n="viewRecentHistory"></span></summary>
      <div class="history-content">
        <p id="downloadCount" class="download-count"></p>
        <ul id="popupHistory" class="popup-history">
          <li><i data-i18n="loadingHistory"></i></li>
        </ul>
      </div>
    </details>
  </section>

</body>
</html>
